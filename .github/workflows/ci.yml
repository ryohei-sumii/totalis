name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Authoritative full-project type gate.
      - name: Typecheck
        run: npm run typecheck

      # Runtime + type-level tests (Vitest, typecheck enabled).
      - name: Test
        run: npm test
